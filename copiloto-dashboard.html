<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>COPILOTO — Panel de Monitoreo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
  <style>
    /* Tipografía de números tabulares para lectura rápida de métricas */
    .tabular-nums { font-variant-numeric: tabular-nums; }
    /* Pulso de emergencia */
    @keyframes emergency-pulse {
      0%, 100% { box-shadow: inset 0 0 0 0 rgba(239, 68, 68, 0); }
      50% { box-shadow: inset 0 0 0 24px rgba(239, 68, 68, 0.25); }
    }
    .emergency-pulse { animation: emergency-pulse 1s ease-in-out infinite; }
    /* Barra de progreso animada */
    .progress-fill { transition: width 0.2s linear, background-color 0.3s ease; }
  </style>
</head>
<body class="bg-slate-950 text-slate-100 antialiased">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useMemo } = React;

    // =========================================================================
    // CONFIGURACIÓN
    // =========================================================================

    // Cambiar a false para ocultar el panel de pruebas en producción.
    const DEMO_MODE = true;

    // Intervalo de polling (ms). En producción se hará fetch real.
    const POLL_INTERVAL_MS = 300;

    // =========================================================================
    // CONTRATO DE DATOS (no modificar — backend Python lo espera así)
    // =========================================================================

    /*
    getState() devuelve:
    {
      status: "ok" | "warning" | "alert",
      level: 0 | 1 | 2,
      driver: string,
      contact: { name: string, notified: boolean },
      risk: boolean,
      risk_secs: number,
      signals: {
        model_label: string,
        model_score: number,
        ear: number,
        eyes_closed: boolean,
        looking_away: boolean,
        face_present: boolean,
        reason: null | "ojos_cerrados" | "mirada_fuera_via" | "sin_rostro"
      },
      alert_count: number,
      fps: number,
      thresholds: { level1_secs: number, level2_secs: number },
      last_event: null | { time: string, reason: string, image_url: string, notified: boolean }
    }
    */

    // Estado mutable que getState() lee. En producción esto desaparece y
    // getState() hará fetch a '/api/state'.
    let mockState = {
      status: "ok",
      level: 0,
      driver: "Juan Pérez",
      contact: { name: "Mamá", notified: false },
      risk: false,
      risk_secs: 0.0,
      signals: {
        model_label: "notdrowsy",
        model_score: 0.98,
        ear: 0.31,
        eyes_closed: false,
        looking_away: false,
        face_present: true,
        reason: null
      },
      alert_count: 0,
      fps: 14.2,
      thresholds: { level1_secs: 1.5, level2_secs: 4.0 },
      last_event: null
    };

    // =========================================================================
    // DATOS SIMULADOS (mock) — SUSTITUIR POR FETCH REAL
    // =========================================================================

    /**
     * ÚNICA fuente de verdad del estado de la app.
     * Hoy devuelve mockState; mañana: await fetch('/api/state').then(r=>r.json())
     */
    async function getState() {
      // TODO: integración futura — reemplazar el cuerpo por:
      // const res = await fetch('/api/state');
      // return await res.json();
      return { ...mockState };
    }

    // =========================================================================
    // HOOKS
    // =========================================================================

    function useCopilotoState() {
      const [state, setState] = useState(null);

      useEffect(() => {
        let active = true;
        const tick = async () => {
          try {
            const next = await getState();
            if (active) setState(next);
          } catch (err) {
            console.error("useCopilotoState: error leyendo estado", err);
          }
        };
        tick();
        const id = setInterval(tick, POLL_INTERVAL_MS);
        return () => {
          active = false;
          clearInterval(id);
        };
      }, []);

      return state;
    }

    function useWebcam(videoRef) {
      const [error, setError] = useState(false);

      useEffect(() => {
        if (!videoRef.current) return;
        navigator.mediaDevices
          .getUserMedia({ video: true })
          .then((stream) => {
            videoRef.current.srcObject = stream;
          })
          .catch(() => setError(true));
      }, [videoRef]);

      return error;
    }

    // =========================================================================
    // UTILIDADES
    // =========================================================================

    function statusConfig(status) {
      switch (status) {
        case "alert":
          return {
            label: "EMERGENCIA",
            colorClass: "text-red-500",
            borderClass: "border-red-500",
            bgClass: "bg-red-500/10",
            glow: "shadow-red-500/30",
            barColor: "bg-red-500"
          };
        case "warning":
          return {
            label: "RIESGO",
            colorClass: "text-amber-400",
            borderClass: "border-amber-400",
            bgClass: "bg-amber-400/10",
            glow: "shadow-amber-400/30",
            barColor: "bg-amber-400"
          };
        default:
          return {
            label: "OK",
            colorClass: "text-emerald-400",
            borderClass: "border-emerald-400",
            bgClass: "bg-emerald-400/10",
            glow: "shadow-emerald-400/30",
            barColor: "bg-emerald-400"
          };
      }
    }

    function formatSeconds(secs) {
      return secs.toFixed(1);
    }

    // =========================================================================
    // ICONOS SVG
    // =========================================================================

    const IconVideo = () => (
      <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
        <path strokeLinecap="round" strokeLinejoin="round" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z" />
      </svg>
    );

    const IconAlertTriangle = () => (
      <svg className="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
        <path strokeLinecap="round" strokeLinejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
      </svg>
    );

    const IconUser = () => (
      <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
        <path strokeLinecap="round" strokeLinejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
      </svg>
    );

    const IconPhone = () => (
      <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
        <path strokeLinecap="round" strokeLinejoin="round" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" />
      </svg>
    );

    const IconActivity = () => (
      <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
        <path strokeLinecap="round" strokeLinejoin="round" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
      </svg>
    );

    // =========================================================================
    // COMPONENTES
    // =========================================================================

    function TopBar({ state }) {
      const cfg = statusConfig(state.status);
      return (
        <header className="flex items-center justify-between px-6 py-4 bg-slate-900 border-b border-slate-800">
          <div className="flex items-center gap-3">
            <div className="flex items-center justify-center w-10 h-10 rounded-lg bg-slate-800 text-slate-100 font-bold tracking-tight">
              CP
            </div>
            <div>
              <h1 className="text-lg font-semibold tracking-wide">COPILOTO</h1>
              <p className="text-xs text-slate-400">Copiloto de seguridad para conductores solos</p>
            </div>
          </div>

          <div className="flex items-center gap-6">
            <div className="flex items-center gap-2 text-sm text-slate-300">
              <IconUser />
              <span>{state.driver}</span>
            </div>
            <div className={`flex items-center gap-2 px-3 py-1.5 rounded-full border ${cfg.borderClass} ${cfg.bgClass}`}>
              <span className={`w-2.5 h-2.5 rounded-full ${cfg.barColor} ${state.status === "alert" ? "animate-pulse" : ""}`} />
              <span className={`text-sm font-semibold ${cfg.colorClass}`}>{cfg.label}</span>
            </div>
            <div className="text-right">
              <div className="text-xs text-slate-500 uppercase tracking-wider">FPS</div>
              <div className="text-sm font-mono tabular-nums text-slate-200">{state.fps.toFixed(1)}</div>
            </div>
          </div>
        </header>
      );
    }

    function VideoFeed({ state }) {
      const videoRef = useRef(null);
      const webcamError = useWebcam(videoRef);
      const cfg = statusConfig(state.status);

      return (
        <div className={`relative overflow-hidden rounded-2xl border-2 ${cfg.borderClass} ${cfg.bgClass} ${state.status === "alert" ? "emergency-pulse" : ""}`}>
          {/*
            REEMPLAZO FUTURO: el feed real será MJPEG del backend.
            Sustituir el contenido de este contenedor por:
            <img src="/video_feed" alt="video" className="w-full h-full object-cover" />
          */}
          {!webcamError ? (
            <video
              ref={videoRef}
              autoPlay
              muted
              playsInline
              className="w-full h-full object-cover aspect-video bg-slate-900"
            />
          ) : (
            <div className="flex flex-col items-center justify-center w-full aspect-video bg-slate-900 text-slate-500">
              <IconVideo />
              <span className="mt-2 text-sm">Cámara no disponible</span>
            </div>
          )}

          {/* Etiqueta de estado flotante */}
          <div className={`absolute top-4 left-4 flex items-center gap-2 px-3 py-1.5 rounded-full border ${cfg.borderClass} ${cfg.bgClass} backdrop-blur`}>
            <span className={`w-2.5 h-2.5 rounded-full ${cfg.barColor} ${state.status !== "ok" ? "animate-pulse" : ""}`} />
            <span className={`text-sm font-bold ${cfg.colorClass}`}>{cfg.label}</span>
          </div>

          {/* Nivel de riesgo */}
          <div className="absolute bottom-4 left-4 px-3 py-1.5 rounded-lg bg-slate-950/70 backdrop-blur text-xs text-slate-300">
            Nivel: <span className="font-mono font-bold text-white">{state.level}</span>
          </div>
        </div>
      );
    }

    function SignalCard({ label, value, subtext, children, alert }) {
      return (
        <div className={`p-4 rounded-xl bg-slate-900 border ${alert ? "border-red-500/40 bg-red-500/5" : "border-slate-800"}`}>
          <div className="flex items-center justify-between mb-2">
            <span className="text-xs uppercase tracking-wider text-slate-500">{label}</span>
            {alert && <IconAlertTriangle />}
          </div>
          <div className="text-2xl font-mono font-semibold tabular-nums">{value}</div>
          {subtext && <div className="text-xs text-slate-400 mt-1">{subtext}</div>}
          {children}
        </div>
      );
    }

    function BooleanBadge({ value, trueLabel, falseLabel, trueColor = "emerald", falseColor = "rose" }) {
      const color = value ? trueColor : falseColor;
      return (
        <span className={`inline-flex items-center px-2.5 py-1 rounded-full text-xs font-medium bg-${color}-500/15 text-${color}-400 border border-${color}-500/30`}>
          {value ? trueLabel : falseLabel}
        </span>
      );
    }

    function SignalPanel({ state }) {
      const { signals, risk_secs, thresholds, status } = state;
      const level1 = thresholds.level1_secs;
      const level2 = thresholds.level2_secs;
      const progressPct = Math.min(100, (risk_secs / level2) * 100);
      const cfg = statusConfig(status);

      return (
        <div className="flex flex-col gap-4 h-full">
          <h2 className="text-sm uppercase tracking-wider text-slate-500 font-semibold">Señales del modelo</h2>

          <SignalCard
            label="Etiqueta del modelo"
            value={signals.model_label}
            subtext={`Confianza: ${(signals.model_score * 100).toFixed(1)}%`}
          />

          <SignalCard label="Confianza del modelo" value={`${(signals.model_score * 100).toFixed(0)}%`}>
            <div className="mt-3 h-2 w-full rounded-full bg-slate-800 overflow-hidden">
              <div
                className="h-full rounded-full bg-blue-500 transition-all duration-200"
                style={{ width: `${signals.model_score * 100}%` }}
              />
            </div>
          </SignalCard>

          <SignalCard label="Apertura ocular (EAR)" value={signals.ear.toFixed(2)} alert={signals.eyes_closed}>
            <div className="mt-3 h-2 w-full rounded-full bg-slate-800 overflow-hidden">
              <div
                className={`h-full rounded-full ${signals.ear < 0.2 ? "bg-red-500" : "bg-emerald-500"} transition-all duration-200`}
                style={{ width: `${Math.min(100, signals.ear * 250)}%` }}
              />
            </div>
            <div className="mt-2 flex gap-2">
              <BooleanBadge value={signals.eyes_closed} trueLabel="Ojos cerrados" falseLabel="Ojos abiertos" trueColor="rose" falseColor="emerald" />
            </div>
          </SignalCard>

          <SignalCard label="Rostro presente" value={signals.face_present ? "Sí" : "No"} alert={!signals.face_present}>
            <div className="mt-2 flex gap-2 flex-wrap">
              <BooleanBadge value={signals.face_present} trueLabel="Detectado" falseLabel="No detectado" />
              <BooleanBadge
                value={!signals.looking_away}
                trueLabel="Mirada en camino"
                falseLabel="Mirada fuera"
                trueColor="emerald"
                falseColor="amber"
              />
            </div>
          </SignalCard>

          <div className={`mt-auto p-5 rounded-2xl border ${cfg.borderClass} ${cfg.bgClass}`}>
            <div className="flex items-end justify-between mb-3">
              <span className="text-xs uppercase tracking-wider text-slate-400">Tiempo en riesgo</span>
              <span className={`text-5xl font-mono font-bold tabular-nums ${cfg.colorClass}`}>
                {formatSeconds(risk_secs)}
                <span className="text-lg text-slate-500 ml-1">s</span>
              </span>
            </div>
            <div className="relative h-3 w-full rounded-full bg-slate-800 overflow-hidden">
              <div
                className={`progress-fill h-full rounded-full ${cfg.barColor}`}
                style={{ width: `${progressPct}%` }}
              />
              {/* Marcadores de umbrales */}
              <div className="absolute top-0 bottom-0 w-0.5 bg-slate-700" style={{ left: `${(level1 / level2) * 100}%` }}>
                <span className="absolute -top-4 -translate-x-1/2 text-[10px] text-slate-500">L1</span>
              </div>
            </div>
            <div className="mt-3 flex justify-between text-xs text-slate-500">
              <span>L1: {level1}s</span>
              <span>L2: {level2}s</span>
            </div>
          </div>
        </div>
      );
    }

    function BottomBar({ state }) {
      const { contact, alert_count, last_event } = state;
      return (
        <footer className="grid grid-cols-3 gap-4 px-6 py-4 bg-slate-900 border-t border-slate-800">
          {/* Contacto de emergencia */}
          <div className="flex items-center gap-4 p-4 rounded-xl bg-slate-950 border border-slate-800">
            <div className={`p-2.5 rounded-lg ${contact.notified ? "bg-red-500/20 text-red-400" : "bg-slate-800 text-slate-300"}`}>
              <IconPhone />
            </div>
            <div>
              <div className="text-xs text-slate-500 uppercase tracking-wider">Contacto de emergencia</div>
              <div className="text-lg font-semibold">{contact.name}</div>
              <div className={`text-xs font-medium ${contact.notified ? "text-red-400" : "text-slate-400"}`}>
                {contact.notified ? "NOTIFICADO" : "En espera"}
              </div>
            </div>
          </div>

          {/* Contador de alertas */}
          <div className="flex items-center gap-4 p-4 rounded-xl bg-slate-950 border border-slate-800">
            <div className="p-2.5 rounded-lg bg-slate-800 text-slate-300">
              <IconAlertTriangle />
            </div>
            <div>
              <div className="text-xs text-slate-500 uppercase tracking-wider">Alertas del viaje</div>
              <div className="text-3xl font-mono font-bold tabular-nums">{alert_count}</div>
            </div>
          </div>

          {/* Timeline */}
          <div className="p-4 rounded-xl bg-slate-950 border border-slate-800 overflow-hidden">
            <div className="flex items-center gap-2 mb-2 text-xs text-slate-500 uppercase tracking-wider">
              <IconActivity />
              <span>Último evento</span>
            </div>
            {last_event ? (
              <div className="text-sm">
                <span className="font-mono text-slate-300">{last_event.time}</span>
                <span className="mx-2 text-slate-600">·</span>
                <span className="text-slate-200 capitalize">{last_event.reason.replace(/_/g, " ")}</span>
                {last_event.notified && (
                  <span className="ml-2 text-xs font-semibold text-red-400">(notificado)</span>
                )}
              </div>
            ) : (
              <div className="text-sm text-slate-500">Sin eventos registrados</div>
            )}
          </div>
        </footer>
      );
    }

    function AlertOverlay({ state }) {
      if (state.status !== "alert") return null;
      const { last_event, contact } = state;

      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center bg-red-950/80 backdrop-blur-sm emergency-pulse">
          <div className="max-w-lg w-full mx-4 p-6 rounded-2xl bg-slate-950 border-2 border-red-500 shadow-2xl shadow-red-500/40">
            <div className="flex items-center gap-3 mb-4">
              <IconAlertTriangle />
              <h2 className="text-2xl font-bold text-red-500">Contacto de emergencia avisado</h2>
            </div>

            <p className="text-slate-300 mb-4">
              El conductor no reaccionó. Se notificó a <span className="font-semibold text-white">{contact.name}</span>.
            </p>

            <div className="rounded-xl overflow-hidden border border-slate-800 bg-slate-900 aspect-video">
              {last_event && last_event.image_url ? (
                <img
                  src={last_event.image_url}
                  alt="Captura del evento"
                  className="w-full h-full object-cover"
                  onError={(e) => { e.currentTarget.style.display = "none"; }}
                />
              ) : (
                <div className="flex flex-col items-center justify-center w-full h-full text-slate-500">
                  <IconVideo />
                  <span className="mt-2 text-sm">Captura no disponible</span>
                </div>
              )}
            </div>

            <div className="mt-4 text-center text-xs text-slate-500 uppercase tracking-wider">
              Último evento: {last_event ? `${last_event.time} · ${last_event.reason}` : "—"}
            </div>
          </div>
        </div>
      );
    }

    function DemoPanel() {
      const [open, setOpen] = useState(true);
      const [, forceUpdate] = useState(0);

      const refresh = () => forceUpdate((n) => n + 1);

      const setScenario = (scenario) => {
        if (scenario === "ok") {
          mockState = {
            ...mockState,
            status: "ok",
            level: 0,
            risk: false,
            risk_secs: 0.0,
            signals: { ...mockState.signals, eyes_closed: false, looking_away: false, face_present: true, reason: null },
            contact: { ...mockState.contact, notified: false }
          };
        } else if (scenario === "warning") {
          mockState = {
            ...mockState,
            status: "warning",
            level: 1,
            risk: true,
            risk_secs: 1.8,
            signals: { ...mockState.signals, eyes_closed: true, looking_away: false, face_present: true, reason: "ojos_cerrados" },
            contact: { ...mockState.contact, notified: false }
          };
        } else if (scenario === "alert") {
          mockState = {
            ...mockState,
            status: "alert",
            level: 2,
            risk: true,
            risk_secs: 5.2,
            signals: { ...mockState.signals, eyes_closed: true, looking_away: false, face_present: true, reason: "ojos_cerrados" },
            alert_count: mockState.alert_count + 1,
            contact: { ...mockState.contact, notified: true },
            last_event: {
              time: new Date().toLocaleTimeString("es-ES", { hour12: false }),
              reason: "ojos_cerrados",
              image_url: null,
              notified: true
            }
          };
        }
        refresh();
      };

      const runAutoDemo = () => {
        setScenario("ok");
        setTimeout(() => setScenario("warning"), 2000);
        setTimeout(() => setScenario("alert"), 5000);
        setTimeout(() => setScenario("ok"), 9000);
      };

      const updateSignal = (key, value) => {
        mockState.signals[key] = value;
        refresh();
      };

      if (!DEMO_MODE) return null;

      return (
        <div className={`fixed top-20 right-4 z-40 w-64 rounded-xl border border-slate-700 bg-slate-900/95 backdrop-blur shadow-xl transition-all ${open ? "translate-x-0" : "translate-x-[calc(100%-2.5rem)]"}`}>
          <button
            onClick={() => setOpen(!open)}
            className="flex items-center justify-between w-full px-4 py-3 text-sm font-semibold text-slate-200 hover:bg-slate-800 rounded-t-xl"
          >
            <span className={open ? "" : "sr-only"}>Panel de pruebas</span>
            <span>{open ? "‹" : "›"}</span>
          </button>

          {open && (
            <div className="p-4 pt-0 space-y-4">
              <div className="space-y-2">
                <span className="text-xs uppercase tracking-wider text-slate-500">Escenarios</span>
                <div className="grid grid-cols-3 gap-2">
                  <button onClick={() => setScenario("ok")} className="px-2 py-1.5 text-xs rounded bg-emerald-500/20 text-emerald-300 hover:bg-emerald-500/30">Normal</button>
                  <button onClick={() => setScenario("warning")} className="px-2 py-1.5 text-xs rounded bg-amber-500/20 text-amber-300 hover:bg-amber-500/30">Riesgo</button>
                  <button onClick={() => setScenario("alert")} className="px-2 py-1.5 text-xs rounded bg-red-500/20 text-red-300 hover:bg-red-500/30">Emerg.</button>
                </div>
                <button onClick={runAutoDemo} className="w-full px-2 py-1.5 text-xs rounded bg-blue-500/20 text-blue-300 hover:bg-blue-500/30">Demo automática</button>
              </div>

              <div className="space-y-3">
                <span className="text-xs uppercase tracking-wider text-slate-500">Señales</span>
                <label className="block text-xs text-slate-400">
                  EAR: {mockState.signals.ear.toFixed(2)}
                  <input
                    type="range"
                    min="0"
                    max="0.6"
                    step="0.01"
                    value={mockState.signals.ear}
                    onChange={(e) => updateSignal("ear", parseFloat(e.target.value))}
                    className="w-full mt-1 accent-blue-500"
                  />
                </label>
                <label className="block text-xs text-slate-400">
                  Confianza: {(mockState.signals.model_score * 100).toFixed(0)}%
                  <input
                    type="range"
                    min="0"
                    max="1"
                    step="0.01"
                    value={mockState.signals.model_score}
                    onChange={(e) => updateSignal("model_score", parseFloat(e.target.value))}
                    className="w-full mt-1 accent-blue-500"
                  />
                </label>
              </div>
            </div>
          )}
        </div>
      );
    }

    function App() {
      const state = useCopilotoState();

      if (!state) {
        return (
          <div className="min-h-screen flex items-center justify-center text-slate-400">
            <div className="flex items-center gap-3">
              <div className="w-5 h-5 border-2 border-slate-600 border-t-blue-500 rounded-full animate-spin" />
              Iniciando COPILOTO…
            </div>
          </div>
        );
      }

      return (
        <div className="min-h-screen flex flex-col">
          <TopBar state={state} />

          <main className="flex-1 grid grid-cols-1 lg:grid-cols-3 gap-6 p-6 min-h-0">
            <section className="lg:col-span-2 flex flex-col min-h-0">
              <VideoFeed state={state} />
            </section>

            <aside className="min-h-0 overflow-y-auto">
              <SignalPanel state={state} />
            </aside>
          </main>

          <BottomBar state={state} />

          <AlertOverlay state={state} />
          <DemoPanel />
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
